name: 构建可执行文件（Windows + macOS）

# 自动在 GitHub 提供的机器上打包：Windows 出 portfolio_rebalance.exe，macOS 出 调仓工具.app。
# 推送代码或手动触发后，到 Actions 页面下载对应产物；打 v* 标签会发到 Release。

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch: {}

# 打 tag 时要创建 Release，需要写仓库内容的权限（默认 token 只读，会报
# "Resource not accessible by integration"）。
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30        # 兜底：任何步骤卡死最多 30 分钟，绝不再无限 hang
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pytest
      - name: 运行测试
        run: pytest -q
      - name: 打包 exe
        run: pyinstaller build/调仓工具.spec --noconfirm --clean
      - name: 冒烟测试打包产物
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen        # 与 macOS 一致，避免窗口程序在无界面 CI 上卡死
        run: |
          $p = Start-Process -FilePath "dist\portfolio_rebalance.exe" -ArgumentList "--selftest" -PassThru -NoNewWindow
          if (-not $p.WaitForExit(120000)) {   # 2 分钟硬超时，卡住即失败而非无限等
            Write-Host "selftest 超时（>120s），强制结束"
            try { $p.Kill() } catch {}
            exit 1
          }
          Write-Host "selftest exit code:" $p.ExitCode
          if ($p.ExitCode -ne 0) { exit 1 }
      - name: 安装 Inno Setup 并打安装包
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" build\installer.iss
      - name: 上传绿色版 exe
        uses: actions/upload-artifact@v4
        with:
          name: 调仓工具-windows-绿色版
          path: dist/portfolio_rebalance.exe
          if-no-files-found: error
      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: 调仓工具-windows-安装包
          path: dist/portfolio_rebalance_setup_v1.1.7.exe
          if-no-files-found: error
      - name: 发布到 Release（打 tag 时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/portfolio_rebalance.exe
            dist/portfolio_rebalance_setup_v1.1.7.exe

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pytest
      - name: 运行测试
        run: pytest -q
      - name: 打包 .app
        run: pyinstaller build/调仓工具.spec --noconfirm --clean
      - name: 冒烟测试打包产物
        run: |
          QT_QPA_PLATFORM=offscreen "dist/调仓工具.app/Contents/MacOS/调仓工具" --selftest
      - name: 压缩 .app
        run: cd dist && ditto -c -k --keepParent "调仓工具.app" "portfolio_rebalance_macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: 调仓工具-macos
          path: dist/portfolio_rebalance_macos.zip
          if-no-files-found: error
      - name: 发布到 Release（打 tag 时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/portfolio_rebalance_macos.zip
